name: Unit Tests

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy nltk textblob vaderSentiment scikit-learn pytest
          python -c "import nltk; nltk.download('vader_lexicon'); nltk.download('punkt')"

      - name: Run tests
        run: pytest tests/ -v
